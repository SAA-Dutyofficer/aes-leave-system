<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AES Leave Management System</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body class="auth-body">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-icon">🚒</div>
        <h1>AES Leave Management</h1>
        <p>Sharjah Airport Authority</p>
      </div>
      <form id="loginForm" class="auth-form">
        <div class="field-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email" required/>
        </div>
        <div class="field-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="toggle-pw" id="togglePw">👁</button>
          </div>
        </div>
        <div class="auth-error" id="loginError"></div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" style="display:none">⏳</span>
        </button>
      </form>
      <p class="auth-hint">Forgot your password? Contact your administrator.</p>
    </div>
    <div class="auth-footer">
      <span class="offline-indicator" id="offlineIndicator" style="display:none">
        ⚠️ You are offline — limited functionality available
      </span>
    </div>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
